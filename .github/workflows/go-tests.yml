name: Go Tests and SonarCloud

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          check-latest: true
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Go tidy (check)
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "::error:: 'go mod tidy' changed go.mod/go.sum. Run it locally and commit."
            git --no-pager diff
            exit 1
          fi

      - name: Install golangci-lint
        run: |
          GOLANGCI_VERSION=v1.64.8
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_VERSION}
          golangci-lint version

      - name: Lint
        run: make lint

      - name: Test with coverage
        run: |
          make test
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out > coverage.txt
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.txt
            coverage.html
            coverage.out

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''  # Исправлено условие
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.go.tests.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/vendor/**,**/mocks/**